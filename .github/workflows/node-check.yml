name: Verificação do código

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verificar:
    name: Verificar sintaxe
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Verificar server.js
        run: npm run check
